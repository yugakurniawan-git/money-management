<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Aplikasi keuangan keluarga - tracking pengeluaran & investasi">

  <!-- PWA iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Money Management">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Theme color (status bar color on mobile) -->
  <meta name="theme-color" content="#1a1a2e">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Money Management</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #1a1a2e;
      margin: 0;
      padding: 0;
    }
    #ios-install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 16px 20px 32px;
      flex-direction: column;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
    }
    #ios-install-banner .banner-close {
      align-self: flex-end;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 8px;
    }
    #ios-install-banner .banner-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    #ios-install-banner h3 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 700;
    }
    #ios-install-banner p {
      margin: 0 0 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }
    #ios-install-banner .steps {
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      box-sizing: border-box;
    }
    #ios-install-banner .step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }
    #ios-install-banner .step-num {
      width: 22px;
      height: 22px;
      background: rgba(102,126,234,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <!-- iOS PWA Install Banner -->
  <div id="ios-install-banner">
    <button class="banner-close" onclick="document.getElementById('ios-install-banner').style.display='none'">✕</button>
    <div class="banner-icon">💰</div>
    <h3>Install Money Management</h3>
    <p>Tambahkan ke Home Screen agar bisa dibuka seperti app</p>
    <div class="steps">
      <div class="step"><span class="step-num">1</span> Tap ikon <strong>Share</strong> (kotak dengan panah atas) di Safari</div>
      <div class="step"><span class="step-num">2</span> Scroll dan pilih <strong>"Add to Home Screen"</strong></div>
      <div class="step"><span class="step-num">3</span> Tap <strong>"Add"</strong> — selesai!</div>
    </div>
  </div>

  <script>
    // Show iOS install banner if on Safari iOS and not in standalone mode
    (function() {
      var isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
      var isStandalone = window.navigator.standalone === true;
      if (isIos && !isStandalone) {
        setTimeout(function() {
          var banner = document.getElementById('ios-install-banner');
          if (banner) banner.style.display = 'flex';
        }, 2500);
      }
    })();
  </script>

  <!-- PDF.js: robust PDF text extraction + OCR for image-based PDFs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    var PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Attempt 1: text-layer extraction via PDF.js
    window.pdfJsExtractText = function(byteData, onSuccess, onError) {
      if (typeof pdfjsLib === 'undefined') { onError('pdfjsLib not loaded'); return; }
      var uint8 = (byteData instanceof Uint8Array) ? byteData : new Uint8Array(byteData);
      pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
      pdfjsLib.getDocument({ data: uint8 }).promise
        .then(function(pdf) {
          var tasks = [];
          for (var i = 1; i <= pdf.numPages; i++) {
            tasks.push(pdf.getPage(i).then(function(page) {
              return page.getTextContent().then(function(tc) {
                return tc.items.map(function(it) { return it.str; }).join('\n');
              });
            }));
          }
          return Promise.all(tasks);
        })
        .then(function(pages) { onSuccess(pages.join('\n')); })
        .catch(function(err) { onError(String(err)); });
    };

    // Attempt 2: OCR via PDF.js render + Tesseract.js (for image-based / iOS PDFs)
    window.ocrPdfPages = function(byteData, onSuccess, onError) {
      if (typeof pdfjsLib === 'undefined') { onError('pdfjsLib not loaded'); return; }

      function runOcr() {
        var uint8 = (byteData instanceof Uint8Array) ? byteData : new Uint8Array(byteData);
        pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;

        Tesseract.createWorker('eng').then(function(ocrWorker) {
          return pdfjsLib.getDocument({ data: uint8 }).promise.then(function(pdf) {
            // Process pages sequentially
            var chain = Promise.resolve([]);
            for (var p = 1; p <= pdf.numPages; p++) {
              (function(pageNum) {
                chain = chain.then(function(texts) {
                  return pdf.getPage(pageNum).then(function(page) {
                    var vp = page.getViewport({ scale: 2.0 });
                    var canvas = document.createElement('canvas');
                    canvas.width = vp.width;
                    canvas.height = vp.height;
                    return page.render({
                      canvasContext: canvas.getContext('2d'), viewport: vp
                    }).promise.then(function() {
                      return ocrWorker.recognize(canvas);
                    }).then(function(result) {
                      texts.push(result.data.text);
                      return texts;
                    });
                  });
                });
              })(p);
            }
            return chain.then(function(texts) {
              return ocrWorker.terminate().then(function() { return texts; });
            });
          });
        }).then(function(texts) {
          onSuccess(texts.join('\n'));
        }).catch(function(err) {
          onError(String(err));
        });
      }

      // Lazy-load Tesseract.js only when needed
      if (typeof Tesseract !== 'undefined') {
        runOcr();
      } else {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = runOcr;
        s.onerror = function() { onError('Gagal load Tesseract.js'); };
        document.head.appendChild(s);
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Auto-reload when a new service worker activates so users always get the latest version
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
