name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Check API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "API key length: ${#OPENAI_API_KEY}"
          if [ -z "$OPENAI_API_KEY" ]; then echo "WARNING: API key is EMPTY"; else echo "API key is set"; fi

      - name: Build Flutter Web
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          printf 'OPENAI_API_KEY=%s' "$OPENAI_API_KEY" > dart_env.txt
          flutter build web --release --base-href / --pwa-strategy=none --dart-define-from-file=dart_env.txt

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: build/web/
          server-dir: /management.yugakurniawan.com/
